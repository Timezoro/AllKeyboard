<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AllKeyboard — Universal Keyboard Translator</title>
    <meta name="description" content="Translate any keyboard layout to English QWERTY in real-time." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  </head>
  <body class="h-screen overflow-hidden bg-gradient-to-br from-slate-950 via-slate-900 to-indigo-950 text-white font-['JetBrains_Mono'] antialiased">

    <!-- Ambient glow blobs -->
    <div class="fixed inset-0 pointer-events-none overflow-hidden -z-10">
      <div class="absolute -top-40 -left-40 w-[500px] h-[500px] bg-indigo-500/15 rounded-full blur-[120px] animate-pulse"></div>
      <div class="absolute top-1/2 -right-40 w-[400px] h-[400px] bg-violet-500/10 rounded-full blur-[100px] animate-pulse [animation-delay:2s]"></div>
    </div>

    <div id="app" class="h-screen flex flex-col items-center justify-end pb-4 px-4">

      <!-- Top bar: logo + language selector (compact) -->
      <div class="w-full max-w-4xl flex items-center justify-between mb-2">
        <div class="flex items-center gap-2">
          <div class="w-7 h-7 rounded-lg bg-gradient-to-br from-indigo-500 to-violet-600 flex items-center justify-center text-xs font-bold shadow-lg shadow-indigo-500/30">⌨</div>
          <h1 class="text-base font-bold bg-gradient-to-r from-white via-indigo-200 to-violet-300 bg-clip-text text-transparent">AllKeyboard</h1>
        </div>
        <div class="flex items-center gap-3">
          <select id="lang-select" class="appearance-none bg-white/5 border border-white/10 rounded-lg px-3 py-1.5 text-xs font-medium text-white backdrop-blur-sm cursor-pointer hover:bg-white/10 transition-colors focus:outline-none focus:ring-2 focus:ring-indigo-500/50">
            <option value="auto">🌐 Auto-Detect</option>
            <option value="russian">🇷🇺 Russian</option>
            <option value="french">🇫🇷 French</option>
            <option value="german">🇩🇪 German</option>
            <option value="arabic">🇸🇦 Arabic</option>
            <option value="thai">🇹🇭 Thai</option>
            <option value="spanish">🇪🇸 Spanish</option>
            <option value="korean">🇰🇷 Korean</option>
            <option value="japanese">🇯🇵 Japanese</option>
          </select>
          <span id="detected-lang-display" class="hidden text-[10px] text-indigo-300">
            Detected: <span id="detected-lang">—</span>
          </span>
        </div>
      </div>

      <!-- Output area (same width as keyboard) -->
      <div class="w-full max-w-4xl mb-2">
        <div class="relative group">
          <div class="absolute -inset-0.5 bg-gradient-to-r from-indigo-500/20 to-violet-500/20 rounded-xl blur opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>
          <div class="relative bg-white/5 backdrop-blur-md border border-white/10 rounded-xl p-3">
            <div class="flex items-center justify-between mb-1">
              <div class="flex items-center gap-3">
                <span class="text-[10px] font-semibold uppercase tracking-wider text-slate-500">Input</span>
                <span class="text-[10px] text-slate-600">→</span>
                <span class="text-[10px] font-semibold uppercase tracking-wider text-emerald-500/70">English Output</span>
              </div>
              <div class="flex items-center gap-2">
                <span class="text-[10px] text-slate-600"><span id="stat-chars">0</span> chars</span>
                <button id="btn-clear" class="text-[10px] text-slate-500 hover:text-red-400 transition-colors px-1.5 py-0.5 rounded hover:bg-red-500/10">Clear</button>
                <button id="btn-copy" class="text-[10px] text-slate-500 hover:text-emerald-400 transition-colors px-1.5 py-0.5 rounded hover:bg-emerald-500/10 flex items-center gap-1">
                  <span id="copy-icon">📋</span> Copy
                </button>
              </div>
            </div>
            <!-- Hidden input captures typing -->
            <textarea id="input-text" rows="1" placeholder="Type here..." class="w-full bg-transparent text-white/40 text-xs leading-relaxed placeholder:text-slate-600 resize-none focus:outline-none h-5 overflow-hidden"></textarea>
            <!-- Visible output -->
            <div id="output-text" class="w-full text-emerald-300 text-lg leading-relaxed min-h-[28px] whitespace-pre-wrap break-words"></div>
          </div>
        </div>
      </div>

      <!-- On-screen keyboard -->
      <div class="w-full max-w-4xl bg-white/[0.03] backdrop-blur-md border border-white/10 rounded-xl p-3">
        <div id="keyboard" class="flex flex-col gap-1.5"></div>
      </div>

      <!-- Footer -->
      <div class="text-[9px] text-slate-700 mt-2">AllKeyboard © 2026</div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
